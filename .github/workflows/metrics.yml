name: Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ===== Base Stats =====
      - name: Base Stats
        uses: tjwodud04/metrics@master
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: metrics-base.svg
          base: header, activity, community, repositories

      # ===== Isometric Calendar (Half Year) =====
      - name: Isocalendar
        uses: tjwodud04/metrics@master
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: metrics-isocalendar.svg
          base: ""
          plugin_isocalendar: yes

      # ===== Coding Habits (Recent) =====
      - name: Coding Habits
        uses: tjwodud04/metrics@master
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: metrics-habits.svg
          template: classic
          base: ""
          config_timezone: Asia/Seoul
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_from: 200
          plugin_habits_languages_limit: 7
          plugin_habits_languages_threshold: 0%
          plugin_habits_trim: yes

      # ===== Stargazers (Classic Charts, recent 14 days) =====
      - name: Stargazers
        uses: tjwodud04/metrics@master
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: metrics-stargazers.svg
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_days: 14
          config_display: large
